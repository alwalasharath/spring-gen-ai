server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /run/promtail/positions.yaml   # <- writable inside container

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # === Your app logs in ./logs on the HOST ===
  - job_name: applogs
    static_configs:
      - targets: [localhost]
        labels:
          job: applogs
          __path__: /host_logs/**/*.log   # <— path inside the promtail container